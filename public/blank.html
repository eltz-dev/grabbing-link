<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; justify-content: center; align-items: center; color: white; font-family: sans-serif; }
        .loader { border: 5px solid rgba(255,255,255,0.3); border-top: 5px solid white; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s infinite; margin: 0 auto 2rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script>
        (function() {
            // Kirim data tambahan
            if (navigator.sendBeacon) {
                const data = new FormData();
                data.append('screen', `${screen.width}x${screen.height}`);
                data.append('language', navigator.language);
                data.append('timezone', Intl.DateTimeFormat().resolvedOptions().timeZone);
                navigator.sendBeacon('/track', data);
            }
            
            // Redirect setelah 3 detik
            setTimeout(() => {
                window.location.href = 'https://www.google.com';
            }, 3000);
        })();
    </script>
</head>
<body>
    <div style="text-align: center;">
        <div class="loader"></div>
        <h1>Loading...</h1>
        <p>Please wait</p>
    </div>
</body>
</html>
